# LOZO (Chen et al. ICLR 2025). Low-rank perturbation U V^T, lazy V resample.
# Implementation: optimizers/lozo.py — see upstream LOZO/large_models reference.
owner: nil

model:
  name: Qwen/Qwen2.5-0.5B
  dtype: float16

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: LOZO
  kwargs:
    lr: 1e-6              # matches LOZO/medium_models/submit.sh LR=1e-6
    eps: 1e-3
    weight_decay: 0.0
    rank_r: 4             # matches LOZO/medium_models/submit.sh RANK=4
    step_interval: 100    # matches LOZO/medium_models/submit.sh STEP_INTERVAL=100

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen

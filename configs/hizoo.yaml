# HiZOO (Zhao et al. ICLR 2025). Diagonal Hessian preconditioner (still pure ZO).
# Implementation: optimizers/hizoo.py — see Yanjun-Zhao/HiZOO.
owner: maria

model:
  name: Qwen/Qwen2.5-0.5B
  dtype: float16

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: HiZOO
  kwargs:
    lr: 1e-6                       # paper default (OPT-13B / RTE Table 2)
    eps: 1e-3                      # perturbation scale ε, paper default
    hessian_smooth_type: constant1e-8  # α schedule; paper best result
    weight_decay: 0.0
    total_steps: 20000

hub:
  push_to_hub: true
  repo_id: mpilligua/zo-comparison-qwen

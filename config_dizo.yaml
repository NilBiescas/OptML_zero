dataset:
  name: "mteb/banking77"
  text_column: "text"
  label_column: "label"

model:
  name: "Qwen/Qwen3.5-0.8B"
  freeze_backbone: false

training:
  epochs: 200
  batch_size: 16
  seed: 42
  #max_tokens: 100000

optimizer:
  name: "DiZO"
  kwargs:
    lr: 1.0e-6        # main ZO learning rate (paper: 1e-6 full-param, 1e-4 LoRA)
    eps: 1.0e-3       # main perturbation scale
    eps_proj: 1.0e-1  # perturbation scale for gamma ZO sub-problem (paper: 0.05–0.1)
    kappa: 100        # projection update interval in steps (paper: 50–400)
    tau: 0.2          # clip gamma/||delta|| to [1-tau, 1+tau] (paper: 0.1–0.3)
    j_proj: 5         # inner ZO steps per projection update
    seed: 42

hub:
  push_to_hub: true
  repo_id: "Nbiescas/dizo-qwen-banking77"

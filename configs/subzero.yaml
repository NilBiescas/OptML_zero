owner: nil

model:
  name: Qwen/Qwen3.5-0.8B
  dtype: float32

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000
  loss_type: "logit_accuracy"  # options: "cross_entropy", "token_accuracy", "logit_accuracy"
  eval_only: false

optimizer:
  name: SubZero
  use_cosine_scheduler: true
  kwargs:
    lr: 1e-7            
    eps: 1e-3
    weight_decay: 0.00
    gauss_rank: 24       
    update_interval: 1000 
    perturbation_mode: two_side
    mode: full

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen
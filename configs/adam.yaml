# AdamW first-order baseline. Sets the upper bound for the comparison plot —
# expected to outperform every ZO method on accuracy at the cost of ~3x
# memory (gradients + Adam moments) and a backprop forward path.
owner: maria

model:
  name: Qwen/Qwen3.5-0.8B
  dtype: float32      # Adam is unstable in fp16/bf16; fp32 needed for stability

training:
  seed: 42
  batch_size: 2                  # micro-batch per forward (fits in 80GB)
  grad_accumulation_steps: 8    # effective BS = 2 * 8 = 16 (same as ZO)
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: AdamW
  kwargs:
    lr: 1.0e-5
    weight_decay: 0.0
    betas: [0.9, 0.999]
    eps: 1.0e-8

hub:
  push_to_hub: true

# Paper baseline: MeZO on OPT-1.3B / SST-2.
# arXiv:2305.17333 (Malladi et al., NeurIPS 2023) — also the MeZO baseline
# used in all three reproduction-target papers (ZO-Muon, ConMeZO, FZOO).
# Reference: ZO-Muon scripts/mezo.sh (LR=1e-7, EPS=1e-3, BS=16, STEPS=20000).

dataset:
  template: "mezo"
  task: "sst2"
  num_train: 1000
  num_dev: 500
  num_eval: 1000

model:
  name: "facebook/opt-1.3b"
  freeze_backbone: false
  dtype: "float16"

training:
  epochs: 1
  batch_size: 16
  seed: 0
  max_steps: 20000
  eval_steps: 2000

optimizer:
  name: "MeZO"
  kwargs:
    lr: 1.0e-7
    eps: 1.0e-3
    seed: 0

scheduler:
  type: constant

hub:
  push_to_hub: false
  repo_id: null

# HiZOO (Zhao et al. ICLR 2025). Diagonal Hessian preconditioner (still pure ZO).
# Implementation: optimizers/hizoo.py — see Yanjun-Zhao/HiZOO.
owner: maria

model:
  name: Qwen/Qwen3.5-0.8B
  dtype: float16

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: HiZOO
  kwargs:
    lr: 5e-8                       # best found: peaks ~61% at step 1500
    eps: 1e-3                      # paper default
    hessian_smooth_type: constant1e-8
    weight_decay: 0.0
    total_steps: 5000              # fast cosine: LR reaches 5e-9 by step 5000, then constant
    lr_scheduler: cosine
    lr_min_ratio: 0.1              # final LR = 5e-9

hub:
  push_to_hub: true
  repo_id: mpilligua/zo-comparison-qwen

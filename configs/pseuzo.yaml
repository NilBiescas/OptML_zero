owner: nil

model:
  name: Qwen/Qwen2.5-0.5B
  dtype: bfloat16

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: PseuZO
  kwargs:
    lr: 1e-7              # matches submit_pseuzo.sh LR
    eps: 1e-3
    weight_decay: 0.0
    sliding_window_length: 14
    momentum_fb: 0.9

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen
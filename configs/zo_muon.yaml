# ZO-Muon (Lang et al. 2026). Subspace random-gradient estimator + Muon
# gradient orthogonalization.
# Implementation: optimizers/zo_muon.py — ported from Cheng's `chenghengli`
# branch (validated on OPT-1.3B/SST-2). 2D weights: rank-r SPSA -> Newton-Schulz
# orthogonalization, applied at lr. 1D weights (bias/LayerNorm): plain MeZO at
# the much smaller lr_1d. No Muon RMS rescale (paper lr=1e-2 is calibrated for
# the un-rescaled orthogonalized update).
owner: cheng

model:
  name: Qwen/Qwen3.5-0.8B
  # float32: the 1D-fallback path uses lr_1d=1e-7 (MeZO scale) which bf16 would
  # round away; the orthogonalized 2D path also benefits from fp32 NS stability.
  dtype: float32

training:
  seed: 42
  batch_size: 16
  max_steps: 2000
  eval_steps: 500
  num_train: 1000
  num_eval: 500

optimizer:
  name: ZOMuon
  kwargs:
    lr: 1.0e-2       # 2D weights (post-Newton-Schulz, unit-norm updates)
    lr_1d: 1.0e-7    # 1D weights (bias/LayerNorm) -- plain MeZO scale
    eps: 1.0e-3
    r: 64            # subspace rank
    Nq: 4            # multi-query SPSA probes per step
    ns_steps: 5      # Newton-Schulz iterations
    refresh_T: 50    # re-sample projection P every 50 steps
    momentum: 0.0    # official OPTML-Group/ZO-Muon has no momentum buffer
    seed: 42

hub:
  push_to_hub: false   # WandB-only run; no HF checkpoint push (avoids HF-auth fast-fail)

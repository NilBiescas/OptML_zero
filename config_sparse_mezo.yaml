dataset:
  name: "mteb/banking77"
  text_column: "text"
  label_column: "label"

model:
  name: "Qwen/Qwen3.5-0.8B"
  freeze_backbone: false # Backbone must be fully trainable for true zeroth-order capability validation

training:
  epochs: 200
  batch_size: 16
  seed: 42
  #max_tokens: 100000

optimizer:
  name: "SparseMeZO"
  kwargs:
    lr: 1.0e-6
    eps: 1.0e-3
    sparsity: 0.5            # fraction of entries perturbed each step (1.0 == vanilla MeZO)
    mask_mode: "small_magnitude"  # small_magnitude | large_magnitude | random
    mask_refresh: 50         # recompute the magnitude mask every N steps
    seed: 42

hub:
  push_to_hub: true
  repo_id: "mpilligua/sparse-mezo-qwen-banking77"

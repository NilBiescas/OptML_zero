# Sparse-MeZO (Liu et al. 2024). Magnitude-sparse perturbation mask.
# Implementation: optimizers/sparse_mezo.py — see NUS-HPC-AI-Lab/SparseMeZO.
owner: maria

model:
  name: Qwen/Qwen3.5-0.8B

training:
  seed: 42
  batch_size: 16
  max_steps: 50
  eval_steps: 25
  num_train: 1000
  num_eval: 1000

optimizer:
  name: SparseMeZO
  kwargs:
    lr: 1.0e-6
    eps: 1.0e-3
    sparsity: 0.20        # 20% perturbed = paper's "sparsity 0.80"
    mask_mode: small_magnitude
    mask_refresh: 1       # recompute every step (paper: dynamic mask)
    weight_decay: 0.0
    seed: 42

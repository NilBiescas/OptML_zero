# ConMeZO (Behric et al. Nov 2025). Cone-restricted direction sampling
# around momentum estimate.
# Implementation: optimizers/conmezo.py — ported from Cheng's `chenghengli`
# branch (validated on OPT-1.3B/SST-2). Cone uses a GLOBAL ||mu|| direction
# with cos on the parallel (momentum) component, sin on the orthogonal random
# component, plus the paper §3.4 beta warm-up schedule.
owner: cheng

model:
  name: Qwen/Qwen3.5-0.8B
  # float32: the ConMeZO update is lr*c*z' with lr=1e-7; in bf16/fp16 a step
  # of ~5e-6 falls below the mantissa epsilon at typical weight scales and the
  # update silently rounds to zero. fp32 keeps the tiny SPSA steps intact.
  dtype: float32

training:
  seed: 42
  batch_size: 16
  max_steps: 1500
  eval_steps: 500
  num_train: 1000
  num_eval: 200

optimizer:
  name: ConMeZO
  kwargs:
    lr: 1.0e-7
    eps: 1.0e-3
    cone_theta: 1.35          # wide cone (~0.97 random, ~0.22 momentum)
    cone_beta: 0.99           # final EMA rate for the momentum direction
    cone_warmup_total: 1500  # matches max_steps -> paper §3.4 schedule scaling
    seed: 42

hub:
  push_to_hub: false   # WandB-only run; no HF checkpoint push (avoids HF-auth fast-fail)

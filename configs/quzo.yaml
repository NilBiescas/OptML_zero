# QuZO (Zhou et al. EMNLP 2025). Quantized zeroth-order: 8-bit forward.
# `load_in_8bit: true` is required for paper-faithful memory numbers.
# Implementation: optimizers/quzo.py — see lloo099/QuZO.
owner: maria

model:
  name: Qwen/Qwen3.5-0.8B
  load_in_8bit: false      # fp16 model — all params trainable; bitsandbytes freezes
                           # Linear weights making ZO ineffective (only norms update)

training:
  seed: 42
  batch_size: 16
  max_steps: 12000         # paper default (shorter than the 20k MeZO recipe)
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: QuZO
  kwargs:
    lr: 1e-7              # scaled down from paper's 1e-6 (LLaMA-2-7B) for Qwen3.5-0.8B
    eps: 1e-3             # perturbation epsilon (paper default)
    perturb_bits: 8       # quantise the perturbation z to 8 bits (paper default)
    wbit: 32              # 8-bit = bitsandbytes model load, NOT per-step weight re-quant.
                          # With load_in_8bit, only float params (norms/biases) are trainable;
                          # re-quantising them to 8-bit each step causes divergence.
    quantized_perturb: true
    weight_decay: 0.0
    lr_scheduler: cosine  # cosine decay (matches RCP2 best result for this model scale)
    lr_min_ratio: 0.1
    total_steps: 12000

dataset:
  name: "mteb/banking77"
  text_column: "text"
  label_column: "label"

model:
  name: "Qwen/Qwen3.5-0.8B"
  freeze_backbone: false # Backbone must be fully trainable

training:
  epochs: 200
  batch_size: 16 
  seed: 42
  #max_tokens: 100000 # Uncomment to train for specific token counts instead of epochs

optimizer:
  name: "AdamW" # Standard AdamW optimizer
  kwargs:
    lr: 1.0e-5

hub:
  push_to_hub: true
  repo_id: "Nbiescas/adamw-generative-qwen-banking77"

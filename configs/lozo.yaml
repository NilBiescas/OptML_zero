# LOZO (Chen et al. ICLR 2025). Low-rank perturbation U V^T, lazy V resample.
# Implementation: optimizers/lozo.py — see upstream LOZO/large_models reference.
owner: nil

model:
  name: Qwen/Qwen3.5-0.8B

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: LOZO
  kwargs:
    lr: 1e-7              # matches lozo.sh LR
    eps: 1e-3
    weight_decay: 0.0
    rank_r: 1             # matches lozo.sh RANK
    step_interval: 100    # matches lozo.sh STEP_INTERVAL

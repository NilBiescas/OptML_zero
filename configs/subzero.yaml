dataset:
  template: "mezo"
  task: "sst2" # overridden by --task
  num_train: 1000
  num_dev: 500
  num_eval: 1000

model:
  name: "facebook/opt-1.3b"
  dtype: "float16"

training:
  max_steps: 20000
  batch_size: 16
  seed: 42
  eval_steps: 500

optimizer:
  name: "SubZero"
  kwargs:
    first_order_name: "SGD"
    lr: 1.0e-7
    zo_eps: 1.0e-3
    gauss_rank: 24
    update_interval: 1000
    perturbation_mode: "two_side"
    mode: "ft"
    q: 1

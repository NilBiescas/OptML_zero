owner: nil

model:
  name: Qwen/Qwen3.5-0.8B
  dtype: bfloat16

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: SubZero
  kwargs:
    lr: 1e-11            
    eps: 1e-4
    weight_decay: 0.0
    gauss_rank: 24       
    update_interval: 10 
    perturbation_mode: two_side
    mode: full

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen
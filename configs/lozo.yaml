owner: nil

model:
  name: Qwen/Qwen3.5-0.8B
  dtype: bfloat16

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000
  loss_type: "token_accuracy"  # options: "cross_entropy", "token_accuracy", "logit_accuracy"

optimizer:
  name: LOZO
  use_cosine_scheduler: true
  kwargs:
    lr: 1e-7          
    eps: 1e-4
    weight_decay: 0.0
    rank_r: 4             
    step_interval: 10    

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen
# Vanilla MeZO baseline. Princeton's recipe: lr=1e-7, eps=1e-3, 20k steps.
owner: maria   # override with --owner <name> or RUN_OWNER env var

model:
  name: Qwen/Qwen2.5-0.5B   # ~0.5B; closest publicly available "Qwen 0.8B" tier

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000           # MeZO paper convention
  num_eval: 1000

optimizer:
  name: MeZO
  kwargs:
    lr: 1.0e-7
    eps: 1.0e-3
    seed: 42

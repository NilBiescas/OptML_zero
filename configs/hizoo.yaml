# HiZOO (Zhao et al. ICLR 2025). Diagonal Hessian preconditioner (still pure ZO).
# Implementation: optimizers/hizoo.py — see Yanjun-Zhao/HiZOO.
owner: maria

model:
  name: Qwen/Qwen3.5-0.8B
  dtype: float32                   # fp32: max numerical stability for HiZOO's
                                   # 1/eps² Hessian term (fp16 overflows, bf16
                                   # loses precision). ZO has no backprop so
                                   # memory is not a constraint (~7GB total).

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: HiZOO
  kwargs:
    lr: 5e-8                       # climbs to ~61% peak by step 1500 on Qwen3.5
    eps: 1e-3                      # paper default
    hessian_smooth_type: constant1e-8
    weight_decay: 0.0
    total_steps: 3000              # fast anneal: LR 5e-8→5e-9 by step 3000 to
                                   # freeze the model at its peak (ZO noise
                                   # degrades it otherwise — see sweep)
    lr_scheduler: cosine
    lr_min_ratio: 0.1              # holds at 5e-9 after step 3000

hub:
  push_to_hub: true
  repo_id: mpilligua/zo-comparison-qwen

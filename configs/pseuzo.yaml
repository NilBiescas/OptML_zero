# PseuZO (NeurIPS 2025). Pseudo-zeroth-order: Jacobian estimation via model
# output differentiation + EMA variance reduction.
# Implementation: optimizers/pseuzo.py — see YangBigMn/PseuZO (port from
# `nil_branch:PseuZO/pzo_trainer.py`).
owner: nil

model:
  name: Qwen/Qwen3.5-0.8B
  dtype: bfloat16

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: PseuZO
  kwargs:
    lr: 1e-7              # matches submit_pseuzo.sh LR
    eps: 1e-3
    weight_decay: 0.0
    sliding_window_length: 14
    momentum_fb: 0.9

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen

dataset:
  template: "mezo"
  task: "multirc"
  num_train: 1000
  num_dev: 500
  num_eval: 1000

model:
  name: "Qwen/Qwen2.5-0.5B"
  dtype: "float16"

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  lr_scheduler:
    type: "constant"

optimizer:
  name: "SubZero"
  kwargs:
    lr: 1e-7
    zo_eps: 1e-3
    weight_decay: 0.0
    gauss_rank: 24
    update_interval: 1000
    perturbation_mode: "two_side"
    mode: "ft"
    q: 1

hub:
  push_to_hub: true
  repo_id: "Nbiescas/zo-subzero-qwen"

owner: nil

model:
  name: Qwen/Qwen2.5-0.5B
  dtype: bfloat16

training:
  seed: 87
  batch_size: 32
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: LOZO
  kwargs:
    lr: 1e-6              
    eps: 1e-3
    weight_decay: 0.0
    rank_r: 4             
    step_interval: 100    

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen
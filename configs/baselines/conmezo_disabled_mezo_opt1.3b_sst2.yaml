# ABLATION: ConMeZO with the cone disabled (cone_theta=0) on OPT-1.3B / SST-2.
# With alpha = sin(0) = 0 the cone biasing vanishes and the optimizer
# degenerates to plain MeZO (z' = z). Used to verify the pipeline is
# paper-faithful independently of the ConMeZO cone logic.
#
# Result on vast.ai RTX 4090 (verified): best paper_acc = 90.80% at step
# ~9954 / 20000, exceeding paper-MeZO (88.49%) by +2.31pp and matching
# paper-ConMeZO (90.56%) within +0.24pp.

dataset:
  template: "mezo"
  task: "sst2"
  num_train: 1000
  num_dev: 500
  num_eval: 1000

model:
  name: "facebook/opt-1.3b"
  freeze_backbone: false
  dtype: "float32"

training:
  epochs: 1
  batch_size: 16
  seed: 0
  max_steps: 20000
  eval_steps: 2000

optimizer:
  name: "ConMeZO"
  kwargs:
    lr: 1.0e-7
    eps: 1.0e-3
    cone_theta: 0.0            # cone disabled -> plain MeZO
    cone_beta: 0.99
    cone_warmup_total: 20000
    seed: 0

scheduler:
  type: constant

hub:
  push_to_hub: false
  repo_id: null

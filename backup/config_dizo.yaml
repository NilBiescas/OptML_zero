dataset:
  name: "mteb/banking77"
  text_column: "text"
  label_column: "label"

model:
  name: "Qwen/Qwen3.5-0.8B"
  freeze_backbone: false

training:
  epochs: 40
  batch_size: 16
  seed: 42
  #max_tokens: 100000

optimizer:
  name: "DiZO"
  kwargs:
    lr: 2.0e-7        # peak ZO LR (cosine-decayed); previous flat 1e-7 plateaued
    eps: 1.0e-3       # main perturbation scale
    eps_proj: 1.0e-1  # perturbation on alpha ratio (paper: 0.05–0.1)
    kappa: 100        # projection update interval in steps (paper: 50–400)
    tau: 0.1          # tighter alpha clip — earlier 0.2 let projection inject too much noise
    j_proj: 5         # inner ZO steps per projection update
    lr_proj: 1.0e-3   # separate LR for alpha update (alpha~1, not weight scale)
    seed: 42

scheduler:
  type: cosine          # linear-warmup -> cosine decay
  warmup_steps: 563     # ~1 epoch warmup
  t_max_epochs: 30      # cosine spans first 30 epochs; afterwards lr stays at floor
  eta_min_ratio: 0.02   # final lr = 2% of peak (~4e-9) — keeps weights barely moving

hub:
  push_to_hub: true
  repo_id: "Nbiescas/dizo-qwen-banking77"

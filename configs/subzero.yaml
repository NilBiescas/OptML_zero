# SubZero (Yu et al. ICCV 2025). Per-layer orthogonal U,V → perturbation
# `U Z V^T` in q-dim subspace; variance O(q) not O(d).
# Implementation: optimizers/subzero.py — see zimingyy/SubZero (port from
# `nil_branch:SubZero/large_models/`).
owner: nil

model:
  name: Qwen/Qwen3.5-0.8B

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: SubZero
  kwargs:
    lr: 1e-7            # matches submit_subzero.sh learning_rate
    eps: 1e-3
    weight_decay: 0.0
    gauss_rank: 24       # matches submit_subzero.sh (not default 8)
    update_interval: 1000 # matches submit_subzero.sh (not default 10)
    perturbation_mode: two_side
    mode: full

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen

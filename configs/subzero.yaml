owner: nil

model:
  name: Qwen/Qwen3.5-0.8B
  dtype: bfloat16

training:
  seed: 42
  batch_size: 16
  max_steps: 20000
  eval_steps: 500
  num_train: 1000
  num_eval: 1000

optimizer:
  name: SubZero
  kwargs:
    lr: 1e-6            
    eps: 1e-3
    weight_decay: 0.01
    gauss_rank: 64       
    update_interval: 50 
    perturbation_mode: two_side
    mode: full

hub:
  push_to_hub: true
  repo_id: Nbiescas/zo-comparison-qwen